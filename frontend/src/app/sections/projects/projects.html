<section id="projects" class="projects-section py-4">

  <div class="mb-5">
    <p class="text-uppercase text-secondary fw-semibold mb-2">
      Selected Projects
    </p>

    <h2 class="display-5 fw-bold mb-3">
      Real-world systems and applications
    </h2>

    <p class="text-secondary project-description">
      Full stack applications, scalable infrastructures and production-ready systems
      combining frontend development, backend architecture and DevOps practices.
    </p>
  </div>

  <div class="row g-4">

    @for (project of projects; track project.slug) {
      <div class="col-xl-6">
        <a
          class="text-decoration-none text-reset"
          [routerLink]="['/projects', project.slug]"
        >
          <app-project-card
            [title]="project.title"
            [description]="project.shortDescription"
            [stack]="project.stack"
            [logo]="project.logo">
          </app-project-card>
        </a>
      </div>
    }

  </div>

</section>

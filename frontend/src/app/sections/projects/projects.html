<section id="projects" class="container py-5">

  <div class="mb-5">
    <p class="text-uppercase text-secondary fw-semibold mb-2">
      Selected Projects
    </p>

    <h2 class="display-5 fw-bold mb-3">
      Real-world systems and applications
    </h2>

    <p class="text-secondary col-lg-8">
      Full stack applications, scalable infrastructures and production-ready systems
      combining frontend development, backend architecture and DevOps practices.
    </p>
  </div>

  <div class="row g-4">

    @for (project of projects; track project.title) {
      <div class="col-lg-6">
        <app-project-card
          [title]="project.title"
          [description]="project.description"
          [stack]="project.stack">
        </app-project-card>
      </div>
    }

  </div>

</section>
